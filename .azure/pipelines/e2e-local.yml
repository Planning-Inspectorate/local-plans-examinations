variables:
  - group: cd_test

trigger: none

pr:
  branches:
    include:
      - main

schedules:
  - cron: '30 3 * * 2-6'
    displayName: Nightly Full Cypress Run
    branches:
      include:
        - main
    always: true

jobs:
  - job: Run_Tests
    displayName: 'Run Cypress Tests'
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal_smoke:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:smoke'
        manage_smoke:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:smoke'
        portal_full:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:all'
        manage_full:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:all'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'

      - task: Npm@1
        inputs:
          command: 'install'

      - script: |
          npx playwright install --with-deps
        displayName: 'Install Browsers'

      - script: |
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
          ADMIN_EMAIL: $(ADMIN_EMAIL)
          ADMIN_PASSWORD: $(ADMIN_PASSWORD)
        displayName: 'Run Cypress Tests'

      # ✅ Always publish JSON reports
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'cypress/reports'
          artifact: 'reports-$(APP_NAME)-$(System.JobAttempt)'
        displayName: 'Publish Cypress JSON Reports'
        condition: succeededOrFailed()

  # 🔥 Merge + Generate Final Report
  - job: Merge_Reports
    displayName: 'Merge & Generate HTML Report'
    dependsOn: Run_Tests
    pool: pins-odt-agent-pool-tests

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'

      - script: |
          npm install mochawesome mochawesome-merge mochawesome-report-generator
        displayName: 'Install Report Tools'

      # ✅ Download all artifacts
      - task: DownloadPipelineArtifact@2
        inputs:
          buildType: 'current'
          downloadPath: '$(Pipeline.Workspace)/artifacts'

      # ✅ Merge JSON
      - script: |
          mkdir -p merged-report
          npx mochawesome-merge "$(Pipeline.Workspace)/artifacts/**/mochawesome*.json" > merged-report/report.json
        displayName: 'Merge JSON Reports'

      # ✅ Generate HTML
      - script: |
          npx marge merged-report/report.json --reportDir merged-report --reportFilename index.html
        displayName: 'Generate HTML Report'

      # ✅ Publish final report
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'merged-report'
          artifact: 'Cypress-HTML-Report'
        displayName: 'Publish Final HTML Report'
