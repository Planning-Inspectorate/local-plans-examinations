variables:
  - group: cd_test

trigger: none

pr:
  branches:
    include:
      - main

schedules:
  - cron: '30 3 * * 2-6'
    displayName: Nightly Full Cypress Run
    branches:
      include:
        - main
    always: true

jobs:
  # ================= RUN TESTS =================
  - job: Run_Tests
    displayName: 'Run Cypress Tests'
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        # FULL tests ONLY on schedule
        ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
          portal_full:
            APP_NAME: 'portal'
            COMMAND: 'cy:portal:all'
          manage_full:
            APP_NAME: 'manage'
            COMMAND: 'cy:manage:all'

        # SMOKE tests for PR + manual
        ${{ if ne(variables['Build.Reason'], 'Schedule') }}:
          portal_smoke:
            APP_NAME: 'portal'
            COMMAND: 'cy:portal:smoke'
          manage_smoke:
            APP_NAME: 'manage'
            COMMAND: 'cy:manage:smoke'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'

      - script: npm ci
        displayName: 'Install dependencies'

      # Cache Playwright browsers
      - task: Cache@2
        inputs:
          key: 'playwright | "$(Agent.OS)"'
          path: ~/.cache/ms-playwright

      # Install Playwright Chromium
      - script: |
          npx playwright install chromium
        displayName: 'Install Playwright Browsers'

      # Optional debug
      - script: |
          echo "Checking Playwright install..."
          ls -la ~/.cache/ms-playwright
        displayName: 'Debug Playwright Install'

      # ✅ Run Cypress (NO pending failure logic)
      - script: |
          npm run $(COMMAND)
        displayName: 'Run Cypress Tests'
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
          ADMIN_EMAIL: $(ADMIN_EMAIL)
          ADMIN_PASSWORD: $(ADMIN_PASSWORD)

      # Publish to Azure DevOps Tests tab
      - task: PublishTestResults@2
        displayName: 'Publish Test Results'
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '**/junit/*.xml'
          mergeTestResults: true
          failTaskOnFailedTests: true
        condition: succeededOrFailed()

      # Publish artifacts
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'cypress/reports'
          artifact: 'reports-$(APP_NAME)-$(System.JobName)-$(System.JobId)'
        displayName: 'Publish Cypress JSON Reports'
        condition: succeededOrFailed()
