variables:
  - group: cd_test

trigger: none

pr:
  branches:
    include:
      - main

schedules:
  - cron: '30 3 * * 2-6'
    displayName: Nightly Full Cypress Run
    branches:
      include:
        - main
    always: true

jobs:
  - job: Run_Smoke_Tests
    displayName: 'PR - Smoke Tests'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:smoke'
        manage:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:smoke'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js'

      - task: Npm@1
        inputs:
          command: 'install'
        displayName: 'Install Dependencies'

      # Run Cypress — build fails on test failures
      - script: |
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
        displayName: 'Run Smoke Tests'

      # Ensure HTML report exists
      - script: |
          if [ ! -f cypress/reports/index.html ]; then
            echo "<h1>No Cypress report generated</h1>" > cypress/reports/index.html
          fi
        displayName: 'Ensure HTML report exists'
        condition: succeededOrFailed()

      # Publish HTML report as artifact
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'cypress/reports'
          artifact: 'Cypress-HTML-Report-$(APP_NAME)'
        displayName: 'Publish HTML Artifact'
        condition: succeededOrFailed()

  - job: Run_Full_Tests
    displayName: 'Nightly - Full Tests'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:all'
        manage:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:all'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js'

      - task: Npm@1
        inputs:
          command: 'install'
        displayName: 'Install Dependencies'

      # Run Cypress — build fails on test failures
      - script: |
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
        displayName: 'Run Full Tests'

      # Ensure HTML report exists
      - script: |
          if [ ! -f cypress/reports/index.html ]; then
            echo "<h1>No Cypress report generated</h1>" > cypress/reports/index.html
          fi
        displayName: 'Ensure HTML report exists'
        condition: succeededOrFailed()

      # Publish HTML report as artifact
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'cypress/reports'
          artifact: 'Cypress-HTML-Report-$(APP_NAME)'
        displayName: 'Publish HTML Artifact'
        condition: succeededOrFailed()
