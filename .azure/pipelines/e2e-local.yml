variables:
  PORTAL_BASE_URL: 'http://localhost:8080'
  MANAGE_BASE_URL: 'http://localhost:8090'

trigger: none

pr:
  branches:
    include:
      - test/LP-592-e2e-tests-pipeline

schedules:
  - cron: '30 3 * * 2-6'
    displayName: Nightly Full Cypress Run
    branches:
      include:
        - test/LP-592-e2e-tests-pipeline
    always: true

jobs:
  - job: Run_Smoke_Tests
    displayName: 'PR - Smoke Tests'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:smoke'
        manage:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:smoke'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js'

      - task: Npm@1
        inputs:
          command: 'install'
        displayName: 'Install Dependencies'

      - script: |
          echo "Running SMOKE tests for $(APP_NAME)"
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
        displayName: 'Run Smoke Tests'

      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: 'cypress/reports'
          artifactName: 'Cypress-Reports-$(APP_NAME)'
        displayName: 'Publish Cypress Reports'
        condition: succeededOrFailed()

      - task: PublishTestResults@2
        inputs:
          testResultsFiles: 'cypress/reports/*.xml'
          testRunTitle: 'Cypress Smoke Tests - $(APP_NAME)'
          failTaskOnFailedTests: true
        displayName: 'Publish Test Results'
        condition: succeededOrFailed()

  - job: Run_Full_Tests
    displayName: 'Nightly - Full Tests'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:all'
        manage:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:all'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js'

      - task: Npm@1
        inputs:
          command: 'install'
        displayName: 'Install Dependencies'

      - script: |
          echo "Running FULL tests for $(APP_NAME)"
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
        displayName: 'Run Full Tests'

      - task: PublishBuildArtifacts@1
        inputs:
          pathToPublish: 'cypress/reports'
          artifactName: 'Cypress-Reports-$(APP_NAME)'
        displayName: 'Publish Cypress Reports'
        condition: succeededOrFailed()

      - task: PublishTestResults@2
        inputs:
          testResultsFiles: 'cypress/reports/*.xml'
          testRunTitle: 'Cypress Full Tests - $(APP_NAME)'
          failTaskOnFailedTests: true
        displayName: 'Publish Test Results'
        condition: succeededOrFailed()
