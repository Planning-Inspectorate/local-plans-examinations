variables:
  - group: cd_test

trigger: none

pr:
  branches:
    include:
      - main

schedules:
  - cron: '30 3 * * 2-6'
    displayName: Nightly Full Cypress Run
    branches:
      include:
        - main
    always: true

jobs:
  - job: Run_Smoke_Tests
    displayName: 'PR - Smoke Tests'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:smoke'
        manage:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:smoke'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js'

      - task: Npm@1
        inputs:
          command: 'install'
        displayName: 'Install Dependencies'

      - script: |
          npx playwright install --with-deps
        displayName: 'Install Playwright Browsers'

      - script: |
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
          ADMIN_EMAIL: $(ADMIN_EMAIL)
          ADMIN_PASSWORD: $(ADMIN_PASSWORD)
        displayName: 'Run Smoke Tests'

      # Ensure HTML report exists
      - script: |
          mkdir -p cypress/reports
          if [ ! -f cypress/reports/index.html ]; then
            echo "<h1>No Cypress report generated</h1>" > cypress/reports/index.html
          fi
        displayName: 'Ensure HTML report exists'
        condition: succeededOrFailed()

  - job: Run_Full_Tests
    displayName: 'Nightly - Full Tests'
    condition: ne(variables['Build.Reason'], 'PullRequest')
    pool: pins-odt-agent-pool-tests

    strategy:
      matrix:
        portal:
          APP_NAME: 'portal'
          COMMAND: 'cy:portal:all'
        manage:
          APP_NAME: 'manage'
          COMMAND: 'cy:manage:all'

    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js'

      - task: Npm@1
        inputs:
          command: 'install'
        displayName: 'Install Dependencies'

      - script: |
          npm run $(COMMAND)
        env:
          PORTAL_BASE_URL: $(PORTAL_BASE_URL)
          MANAGE_BASE_URL: $(MANAGE_BASE_URL)
          ADMIN_EMAIL: $(ADMIN_EMAIL)
          ADMIN_PASSWORD: $(ADMIN_PASSWORD)
        displayName: 'Run Full Tests'

      # Ensure HTML report exists
      - script: |
          mkdir -p cypress/reports
          if [ ! -f cypress/reports/index.html ]; then
            echo "<h1>No Cypress report generated</h1>" > cypress/reports/index.html
          fi
        displayName: 'Ensure HTML report exists'
        condition: succeededOrFailed()

  - job: Publish_Reports
    displayName: 'Publish Merged HTML Reports'
    dependsOn:
      - Run_Smoke_Tests
      - Run_Full_Tests
    pool: pins-odt-agent-pool-tests

    steps:
      - checkout: none

      # Merge portal + manage reports into one folder
      - script: |
          mkdir -p merged-reports
          cp -r $(Pipeline.Workspace)/Run_Smoke_Tests/portal/cypress/reports/* merged-reports/ 2>/dev/null || true
          cp -r $(Pipeline.Workspace)/Run_Smoke_Tests/manage/cypress/reports/* merged-reports/ 2>/dev/null || true
          cp -r $(Pipeline.Workspace)/Run_Full_Tests/portal/cypress/reports/* merged-reports/ 2>/dev/null || true
          cp -r $(Pipeline.Workspace)/Run_Full_Tests/manage/cypress/reports/* merged-reports/ 2>/dev/null || true
        displayName: 'Collect Reports'

      # Publish merged report as a single artifact
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'merged-reports'
          artifact: 'Cypress-HTML-Report'
        displayName: 'Publish Merged HTML Report'
