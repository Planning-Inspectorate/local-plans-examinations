trigger:
  branches:
    include:
      - main
      - gh-readonly-queue/*
  paths:
    include:
      - .azure/pipelines/e2e.yml
      - .azure/pipelines/steps/run-local-e2e.yml
      - .azure/pipelines/variables.yml
      - apps/manage/**
      - apps/portal/**
      - cypress/**
      - cypress.config.ts
      - docker-compose.yml
      - package.json
      - package-lock.json
      - packages/**

pr:
  autoCancel: true
  branches:
    include:
      - '*'
  paths:
    include:
      - .azure/pipelines/e2e.yml
      - .azure/pipelines/steps/run-local-e2e.yml
      - .azure/pipelines/variables.yml
      - apps/manage/**
      - apps/portal/**
      - cypress/**
      - cypress.config.ts
      - docker-compose.yml
      - package.json
      - package-lock.json
      - packages/**

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.25.2

extends:
  template: stages/wrapper_ci.yml@templates
  parameters:
    gitFetchDepth: 0
    skipAzureAuth: true
    globalVariables:
      - template: .azure/pipelines/variables.yml@self
    validationJobs:
      - name: Run E2E Shard 1
        steps:
          - template: .azure/pipelines/steps/run-local-e2e.yml@self
            parameters:
              shardIndex: '1'
              shardCount: '2'
      - name: Run E2E Shard 2
        steps:
          - template: .azure/pipelines/steps/run-local-e2e.yml@self
            parameters:
              shardIndex: '2'
              shardCount: '2'
