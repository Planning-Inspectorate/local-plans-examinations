parameters:
  - name: shardIndex
    type: string
  - name: shardCount
    type: string

steps:
  - bash: |
      set -euo pipefail

      if [ -n "${SYSTEM_PULLREQUEST_TARGETBRANCH:-}" ]; then
        target_branch="${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
        git fetch origin "refs/heads/$target_branch:refs/remotes/origin/$target_branch"
        base_commit="$(git merge-base HEAD "origin/$target_branch")"
      else
        base_commit="$(git rev-parse HEAD~1)"
      fi

      run_manage_checks=false
      run_portal_checks=false

      while IFS= read -r file; do
        [ -z "$file" ] && continue

        case "$file" in
          apps/manage/*|cypress/*/manage/*)
            run_manage_checks=true
            ;;
          apps/portal/*|cypress/*/portal/*)
            run_portal_checks=true
            ;;
          infrastructure/*)
            ;;
          *)
            run_manage_checks=true
            run_portal_checks=true
            ;;
        esac
      done <<< "$(git diff --name-only "$base_commit" HEAD)"

      echo "Detected test areas: manage=$run_manage_checks, portal=$run_portal_checks"

      echo "##vso[task.setvariable variable=runManageChecks]$run_manage_checks"
      echo "##vso[task.setvariable variable=runPortalChecks]$run_portal_checks"
    displayName: Detect changed test areas
  - task: UseNode@1
    condition: or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true'))
    displayName: Install Node.js
    inputs:
      version: '22.x'
  - task: Cache@2
    condition: or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true'))
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)" | package-lock.json
      path: $(npm_config_cache)
    displayName: Cache NPM
  - template: steps/node_script.yml@templates
    parameters:
      condition: or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true'))
      nodeVersion: 22
      script: npm ci
      environmentVariables:
        npm_config_cache: $(npm_config_cache)
  - template: steps/node_script.yml@templates
    parameters:
      condition: or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true'))
      nodeVersion: 22
      script: npm run db-generate
  - template: steps/node_script.yml@templates
    parameters:
      condition: eq(variables.runPortalChecks, 'true')
      nodeVersion: 22
      workingDirectory: $(Build.Repository.LocalPath)/apps/portal
      script: npm run build
  - template: steps/node_script.yml@templates
    parameters:
      condition: eq(variables.runManageChecks, 'true')
      nodeVersion: 22
      workingDirectory: $(Build.Repository.LocalPath)/apps/manage
      script: npm run build
  - bash: |
      set -euo pipefail

      if docker compose version > /dev/null 2>&1; then
        echo "##vso[task.setvariable variable=ComposeCommand]docker compose"
      elif command -v docker-compose > /dev/null 2>&1; then
        echo "##vso[task.setvariable variable=ComposeCommand]docker-compose"
      else
        echo "Docker Compose is not available on this agent."
        exit 1
      fi
    condition: and(succeeded(), or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true')))
    displayName: Detect Docker Compose command
  - bash: |
      set -euo pipefail

      if [ -z "${MSSQL_DATA_VOLUME:-}" ]; then
        rm -rf tmp/mssql-data
      fi

      $(ComposeCommand) down -v
      $(ComposeCommand) up -d mssql

      for attempt in {1..30}; do
        if npm run db-migrate-prod; then
          exit 0
        fi

        echo "SQL Server is not ready yet. Retrying migration in 5 seconds..."
        sleep 5
      done

      echo "SQL Server did not become ready in time."
      $(ComposeCommand) logs mssql
      exit 1
    condition: and(succeeded(), or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true')))
    displayName: Start local database and apply migrations
    env:
      MSSQL_DATA_MOUNT: mssql-data
      MSSQL_DATA_VOLUME: local-plans-mssql-data-${{ parameters.shardIndex }}
      SQL_CONNECTION_STRING: $(localSqlConnectionString)
      SQL_CONNECTION_STRING_ADMIN: $(localSqlConnectionString)
  - bash: |
      set -euo pipefail

      shard_index="${{ parameters.shardIndex }}"
      shard_count="${{ parameters.shardCount }}"
      spec_list="$(
        find cypress/e2e/manage -type f -name '*.cy.ts' | sort | awk \
          -v shard_index="$shard_index" \
          -v shard_count="$shard_count" \
          '((NR - 1) % shard_count) == (shard_index - 1) { print }' | paste -sd, -
      )"

      if [ -z "$spec_list" ]; then
        echo "No manage specs were assigned to shard $shard_index of $shard_count"
        exit 0
      fi

      npm run db-clear
      npm run start --workspace=local-plans-manage &
      app_pid=$!

      cleanup() {
        pkill -P "$app_pid" 2>/dev/null || true
        kill "$app_pid" 2>/dev/null || true
        wait "$app_pid" 2>/dev/null || true
      }
      trap cleanup EXIT

      echo "Waiting for app health at $(manageLocalBaseUrl)/health"
      for attempt in {1..60}; do
        if curl --fail --silent "$(manageLocalBaseUrl)/health" > /dev/null; then
          echo "Running manage E2E shard $shard_index of $shard_count"
          echo "$spec_list" | tr ',' '\n'
          npm run cy:manage:all -- --spec "$spec_list"
          exit 0
        fi

        sleep 2
      done

      echo "App did not become healthy in time."
      exit 1
    condition: and(succeeded(), eq(variables.runManageChecks, 'true'))
    displayName: Run manage E2E tests against local app
    env:
      AUTH_DISABLED: 'true'
      GOV_NOTIFY_DISABLED: 'true'
      MANAGE_BASE_URL: $(manageLocalBaseUrl)
      PORT: 8090
      PORTAL_URL: $(portalLocalBaseUrl)
      SESSION_SECRET: $(localSessionSecret)
      SQL_CONNECTION_STRING: $(localSqlConnectionString)
  - bash: |
      set -euo pipefail

      shard_index="${{ parameters.shardIndex }}"
      shard_count="${{ parameters.shardCount }}"
      spec_list="$(
        find cypress/e2e/portal -type f -name '*.cy.ts' | sort | awk \
          -v shard_index="$shard_index" \
          -v shard_count="$shard_count" \
          '((NR - 1) % shard_count) == (shard_index - 1) { print }' | paste -sd, -
      )"

      if [ -z "$spec_list" ]; then
        echo "No portal specs were assigned to shard $shard_index of $shard_count"
        exit 0
      fi

      npm run db-clear
      npm run start --workspace=local-plans-portal &
      app_pid=$!

      cleanup() {
        pkill -P "$app_pid" 2>/dev/null || true
        kill "$app_pid" 2>/dev/null || true
        wait "$app_pid" 2>/dev/null || true
      }
      trap cleanup EXIT

      echo "Waiting for app health at $(portalLocalBaseUrl)/health"
      for attempt in {1..60}; do
        if curl --fail --silent "$(portalLocalBaseUrl)/health" > /dev/null; then
          echo "Running portal E2E shard $shard_index of $shard_count"
          echo "$spec_list" | tr ',' '\n'
          npm run cy:portal:all -- --spec "$spec_list"
          exit 0
        fi

        sleep 2
      done

      echo "App did not become healthy in time."
      exit 1
    condition: and(succeeded(), eq(variables.runPortalChecks, 'true'))
    displayName: Run portal E2E tests against local app
    env:
      GOV_NOTIFY_DISABLED: 'true'
      PORT: 8080
      PORTAL_BASE_URL: $(portalLocalBaseUrl)
      SESSION_SECRET: $(localSessionSecret)
      SQL_CONNECTION_STRING: $(localSqlConnectionString)
  - bash: mkdir -p cypress/reports
    condition: failed()
    displayName: Prepare Cypress artifacts
  - task: PublishPipelineArtifact@1
    condition: failed()
    displayName: Publish Cypress artifacts
    inputs:
      targetPath: $(Build.Repository.LocalPath)/cypress/reports
      artifact: cypress-reports-shard-${{ parameters.shardIndex }}
  - bash: |
      if docker compose version > /dev/null 2>&1; then
        docker compose down -v
      elif command -v docker-compose > /dev/null 2>&1; then
        docker-compose down -v
      fi

      if [ -z "${MSSQL_DATA_VOLUME:-}" ]; then
        rm -rf tmp/mssql-data
      fi
    condition: and(always(), or(eq(variables.runManageChecks, 'true'), eq(variables.runPortalChecks, 'true')))
    displayName: Stop local database
    env:
      MSSQL_DATA_MOUNT: mssql-data
      MSSQL_DATA_VOLUME: local-plans-mssql-data-${{ parameters.shardIndex }}
