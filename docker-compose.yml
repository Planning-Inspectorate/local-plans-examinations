services:
  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: local-plans-mssql
    platform: linux/amd64 # force platform, so ARM machines to use emulation
    cap_add: ['SYS_PTRACE']
    user: root
    init: true
    environment:
      - 'ACCEPT_EULA=1'
      - 'MSSQL_SA_PASSWORD=DockerDatabaseP@22word!'
    ports:
      - 1433:1433
    hostname: mssql
    volumes:
      - ./packages/database/src/configuration/mssql.conf:/var/opt/mssql/mssql.conf
      - ${MSSQL_DATA_MOUNT:-./tmp/mssql-data}:/var/opt/mssql/data

volumes:
  mssql-data:
    name: ${MSSQL_DATA_VOLUME:-local-plans-mssql-data}
